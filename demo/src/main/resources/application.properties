# Application port
server.port=${SERVER_PORT}

# Database connection
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Frontend URL
frontend.url=${FRONTEND_URL}

# Encryption secret (can also be in .env)
encryption.secret=${ENCRYPTION_SECRET}

paymongo.secret-key=${PAYMONGO_KEY}
paymongo.webhook-secret=${WEBHOOK_KEY}

# Where PayMongo redirects after payment
paymongo.success-url=${FRONTEND_URL}/success/payment
paymongo.cancel-url=${FRONTEND_URL}/cancel/payment

okhttp.connect-timeout=10
okhttp.read-timeout=30
